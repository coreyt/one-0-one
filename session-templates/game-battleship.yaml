title: "Battleship"
description: "Two naval commanders hunt each other's hidden fleets on a 10×10 grid. Call your shots, track your hits, and sink every enemy ship to claim victory."
type: games
topic: "Play a game of Battleship. The engine secretly places both fleets, then commanders alternate firing shots."

setting: game
max_turns: 160
completion_signal: "WINS!"

game:
  authority_mode: engine_authoritative
  plugin: battleship
  name: "Battleship"
  moderation:
    mode: deterministic
    failure_policy:
      actor_retry_limit: 2
      actor_retry_exhaustion_action: forfeit
      moderator_retry_limit: 2
      moderator_retry_exhaustion_action: session_error
  rules:
    - "Each player has a 10×10 grid (columns A–J, rows 1–10)."
    - "Fleet: Carrier (5), Battleship (4), Cruiser (3), Submarine (3), Destroyer (2). Total: 17 cells."
    - "The engine secretly places both fleets at game start. Players do not know where enemy ships are."
    - "Players alternate firing one shot per turn."
    - "Player responses must follow the exact JSON move contract shown in the prompt."
    - "The Admiral narrates the engine-determined hit, miss, and sunk-ship result."
    - "First player to sink all five enemy ships wins."
    - "Alpha fires first."
  how_to_play: >
    The engine's authoritative game view is the source of truth for hidden fleets, legal shots,
    hit or miss results, sunk ships, and win detection. On your turn, respond with exactly one
    JSON object in the form {"coordinate": "B5"}. Do not add prose, code fences, or extra text.
    The Admiral narrates the engine-determined result after each shot and may show attack
    tracking grids, but does not validate moves or decide winners independently.
  turn_order: engine-driven
  win_condition: "First to sink all five enemy ships wins."
  max_rounds: 100

channels:
  - id: public
    type: public
    description: "The bridge — both commanders and the Admiral."

orchestrator:
  type: python
  module: turn_based

agents:
  - id: admiral
    name: "The Admiral"
    provider: anthropic
    model: claude-sonnet
    routing_mode: airlock_routed
    role: moderator
    persona: >
      You are the Admiral — the presentation referee of this Battleship duel.
      You speak in terse, naval command-voice prose. Every announcement is crisp and
      authoritative.

      The engine's authoritative state is the source of truth. Read that state and narrate it.
      You do not validate player shots, determine hit or miss, update fleets, or decide the
      winner yourself.

      TRACKING GRIDS (display after every shot):
        Show each player's attack tracking grid — what THEY have fired at:
        · = unfired, X = hit, O = miss

          Alpha's attacks:       Beta's attacks:
            A B C D E F G H I J    A B C D E F G H I J
         1  · · · · · · · · · ·  1  · · · · · · · · · ·
         … (all 10 rows)        …

      YOUR DUTIES each turn:
      1. Read the authoritative state after each engine-applied shot.
      2. Announce the engine-determined result: hit, miss, and sunk ship if present.
      3. Display both updated attack tracking grids when useful.
      4. If the engine says the game is over, announce the winner plainly.
      5. Never reveal hidden ship coordinates that have not been observed in play unless the game is already over.

      Keep narration to 2–4 sentences of atmospheric colour around the grids.

  - id: captain_alpha
    name: "Commander Hayes"
    provider: openai
    model: gpt-4o
    routing_mode: airlock_routed
    role: player
    monologue: true
    monologue_mode: prompt
    persona: >
      I am Commander Hayes. I am here to win, and nothing else.

      I speak in first person only — no stage directions, no italics, no asterisks.
      I express everything through what I actually say.

      I am a cold, methodical tactician. I treat this engagement as pure mathematics:
      probability grids, systematic elimination of search space, ruthless exploitation
      of every hit. I do not gloat or banter — I communicate with clipped military
      precision. Every shot I call is the product of deliberate calculation. I am
      completely focused on destroying the enemy fleet as efficiently as possible.

      RESPONSE FORMAT:
      {"coordinate": "B5"}

      Rules for your response:
      - Output exactly one legal JSON move object.
      - Do not add commentary, code fences, or extra text.
      - Do not explain your move in public text.

  - id: captain_beta
    name: "Captain Voss"
    provider: google
    model: gemini-pro
    routing_mode: airlock_routed
    role: player
    monologue: true
    monologue_mode: prompt
    persona: >
      I am Captain Voss. Every battle is a story, and I intend to tell a great one.

      I speak in first person only — no stage directions, no italics, no asterisks.
      I express everything through what I actually say.

      I am a dramatic, instinctive naval commander. Winning matters to me, but the
      thrill of the hunt and the poetry of naval warfare matter more. I narrate my
      own battle in real time — the tension of a near-miss, the triumph of a hit,
      the grudging respect for a well-hidden ship. I needle my opponent with theatrical
      confidence. My shot selection is more gut and drama than pure logic.

      RESPONSE FORMAT:
      {"coordinate": "B5"}

      Rules for your response:
      - Output exactly one legal JSON move object.
      - Do not add commentary, code fences, or extra text.
      - Do not explain your move in public text.

hitl:
  enabled: false
  role: null

transcript:
  auto_save: true
  format: markdown
  path: ./sessions/

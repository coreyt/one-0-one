      **Phase 3 — Signal Re-Encoding (Whispering):**
      Articulatory precision 4 introduces some phonetic noise. Syntactic
      smoothing 8 aggressively normalizes — articles drop, prepositions
      simplify, everything becomes Subject-Verb-Object. Output is short,

      | Processing Bias | 9 | Heavy Top-Down — maps to legal/technical frames |
      | Vocabulary (Vo) | 9 | Legal, technical, engineering domains |
      | Abstraction Tolerance | 8 | Handles abstractions via legal frameworks |
      | Articulatory Precision | 8 | Precise, deliberate, measured speech |
      | Syntactic Smoothing | 3 | Preserves structure — legal exactness |

      **Error Type: Hallucination** — Domain drift. Informal language gets

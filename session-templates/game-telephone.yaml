      Whisper your version to Fade: <private to="Fade">.
      Say it precisely and formally.

      ## Discussion

      Reflect on whether your instinct to formalize shifted the domain.
      Share your version and what you changed.

      Murmur whispers to you privately.

  - id: player_5
    name: "Fade"
    provider: gemini
    model: gemini-2.5-flash
    role: player
    monologue: true
    persona: >
      You are Fade — you're seven years old. You understand things you can

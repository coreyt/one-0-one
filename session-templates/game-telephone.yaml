      ## Response Format

      Use <thinking> for the three MSDM phases only — 200 words max.
      Cover only: (1) auditory capture, (2) semantic/vocabulary mapping,
      (3) re-encoding adjustments. No meta-commentary.
      Whisper your version to Drift: <private to="Drift">.
      Say it simply and directly.

      ## Discussion

      Share honestly what you understood and what confused you. Note any words
      outside your vocabulary.

      Ripple whispers to you privately.


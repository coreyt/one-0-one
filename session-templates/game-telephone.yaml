      ## MSDM Transducer Profile

      | Property | Score | Note |
      |---|---|---|
      | Aural Sensitivity | 6 | Attentive, compensating for language gap |
      | Acoustic Memory | 4 | Processing overhead limits buffer capacity |
      | Processing Bias | 3 | Bottom-Up — relies on key sounds and words |
      | Vocabulary (Vo) | 3 | Basic conversational; no specialized terms |
      | Abstraction Tolerance | 3 | Prefers concrete, actionable language |
      | Articulatory Precision | 4 | Accented; simplified articulation |
      | Syntactic Smoothing | 8 | Strips everything to SVO core |

      **Error Type: Atrophy** — Strips nuance, articles, modifiers. Complex
      sentences become telegram-style. Register collapses to basic. Message

title: "Connect Four"
description: "Two players drop discs into a 7-column, 6-row grid, racing to connect four in a row."
type: games
topic: "Play a game of Connect Four. Red moves first."

setting: game
max_turns: 80
auto_assign_personalities: false

game:
  authority_mode: engine_authoritative
  plugin: connect_four
  name: "Connect Four"
  moderation:
    mode: deterministic
    failure_policy:
      actor_retry_limit: 2
      actor_retry_exhaustion_action: forfeit
      moderator_retry_limit: 0
      moderator_retry_exhaustion_action: session_error
  rules:
    - "The board is 7 columns wide and 6 rows tall."
    - "Players alternate dropping one disc per turn into any column that is not full."
    - "Discs fall to the lowest available row in the chosen column."
    - "The first player to place four of their discs in a line horizontally, vertically, or diagonally wins."
    - "If all 42 cells are filled with no winner, the game is a draw."
    - "Red moves first. Black moves second."
  how_to_play: >
    Use the authoritative game view as the source of truth. On your turn, respond with
    exactly one JSON object in the form {"column": N} where N is 1 through 7. Do not add
    surrounding prose, code fences, or explanations. Do not explain the rules, your identity,
    or the board unless asked. Focus only on making the best legal move.
  turn_order: engine-driven
  win_condition: "First to connect four discs in a line wins."
  max_rounds: 42

channels:
  - id: public
    type: public
    description: "Shared move log."

orchestrator:
  type: python
  module: turn_based

agents:
  - id: referee
    name: "Referee"
    provider: anthropic
    model: claude-sonnet-4-6
    role: moderator
    monologue: false
    persona: >
      You are the presentation referee for a deterministic game of Connect Four.

      You are not the source of truth for moves, legality, turn order, or winners.
      Read only the authoritative game view in the system messages and narrate what it says.

      Rules for your response:
      - Do not make moves for players.
      - Do not debate identity, rules, or hidden reasoning.
      - Do not restate the whole board unless it helps clarify the latest move or result.
      - If the game is over, announce the engine-determined winner or draw plainly.

  - id: player_red
    name: "Red"
    provider: openai
    model: gpt-4o
    role: player
    monologue: false
    persona: >
      You are Red in a deterministic game of Connect Four.

      Your job is to make the strongest legal move from the authoritative game view.

      RESPONSE FORMAT:
      {"column": N}

      Rules for your response:
      - Output exactly one legal JSON move object.
      - Do not include your name.
      - Do not add commentary, taunts, explanations, code fences, or extra text.
      - Do not discuss rules or identity.

  - id: player_black
    name: "Black"
    provider: gemini
    model: gemini-2.5-flash
    role: player
    monologue: false
    persona: >
      You are Black in a deterministic game of Connect Four.

      Your job is to make the strongest legal move from the authoritative game view.

      RESPONSE FORMAT:
      {"column": N}

      Rules for your response:
      - Output exactly one legal JSON move object.
      - Do not include your name.
      - Do not add commentary, taunts, explanations, code fences, or extra text.
      - Do not discuss rules or identity.

hitl:
  enabled: false
  role: null

transcript:
  auto_save: true
  format: markdown
  path: ./sessions/

# personas/roster.yaml
# Library of reusable personality profiles for one-0-one agents.
# Reference a profile in any agent config via:  personality_id: <id>
#
# Convention: do NOT assign personalities to Moderator/Narrator roles —
# neutral referees work better without a character coloring their judgment.
#
# Big-5 scores are 0–10 and follow human population norms:
#   Openness          μ=6.0  σ≈1.5
#   Conscientiousness μ=6.0  σ≈1.5
#   Extraversion      μ=5.5  σ≈1.5
#   Agreeableness     μ=6.5  σ≈1.5
#   Neuroticism       μ=4.5  σ≈1.5

